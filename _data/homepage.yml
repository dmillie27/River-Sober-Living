faq:
  - question: "Who is eligible to live at River Sober Living?"
    answer: "River Sober Living is for adult men (18+) who are committed to sobriety and seeking a structured, supportive environment. Applicants should have completed or be actively enrolled in a primary treatment program."
  - question: "How long can I live at a River Sober Living house?"
    answer: "Length of stay varies by individual. We have no fixed maximum stay — residents remain as long as they are actively working their recovery, meeting house requirements, and benefiting from the community."
  - question: "What does rent include?"
    answer: "Rent covers a furnished room in a shared home with common living areas, utilities, Wi-Fi, and access to all LEAP program resources and house manager support. Call or email us for current pricing and availability."
  - question: "Do you accept referrals from treatment centers?"
    answer: "Yes. We are a Preferred Provider through Hazelden Betty Ford Foundation and work with referrals from treatment centers, hospitals, therapists, and case managers throughout Idaho and the surrounding region."
  - question: "What happens if a resident relapses?"
    answer: "River Sober Living operates a zero tolerance policy. Any resident found using drugs or alcohol will be asked to leave the house. We can assist departing residents in connecting with higher levels of care as needed."
  - question: "How do I apply or check availability?"
    answer: "You can apply using the form on this page, call us at (208) 576-9527, or email marcus@riversoberliving.com. Our hours are Monday through Sunday, 8am–10pm."
  - question: "Are meetings required?"
    answer: "Yes. All residents are required to attend a minimum of 3 recovery meetings per week. Having an active sponsor and working a program are also requirements of residency."

