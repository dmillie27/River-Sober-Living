hero:
  headline: "Begin Your New Chapter"
  subheading: "A safe, structured, and supportive community for men committed to lasting recovery. Walk beside the river. Rebuild your life."
  cta_primary: "Apply for Residency"
  cta_secondary: "Call (208) 576-9527"

who_we_are:
  heading: "Recovery built on community & purpose"
  body: "River Sober Living is a men's sober living community in Boise, Idaho, founded in 2017 with a simple belief: lasting recovery happens in the context of genuine community, personal accountability, and intentional structure. Situated along the Boise River Greenbelt, our homes offer more than a safe place to sleep. We offer a framework for growth — one that bridges the gap between residential treatment and independent living."
  year_founded: "2017"
  num_homes: "4"
  days_support: "365"

leap:
  heading: "The LEAP Program"
  subheading: "LEAP is the foundation of life at River Sober Living — a four-pillar framework designed to guide each resident toward meaningful, sustainable recovery."
  pillars:
    - letter: "L"
      title: "Living"
      description: "Learning to live well in sobriety means establishing daily routines, healthy habits, and a stable home environment. We focus on the fundamentals of sober life: sleep, nutrition, exercise, and self-care."
    - letter: "E"
      title: "Engaging"
      description: "Recovery doesn't happen in isolation. Residents engage with their peers, house managers, and the broader recovery community through meetings, group activities, and shared responsibilities."
    - letter: "A"
      title: "Achieving"
      description: "We support residents in setting and reaching meaningful goals — employment, education, financial independence, and personal milestones that build confidence and purpose."
    - letter: "P"
      title: "Persevering"
      description: "Long-term recovery requires resilience. We equip residents with the coping tools, relapse-prevention strategies, and support network to face challenges and keep moving forward."

house_rules:
  heading: "Structure & House Rules"
  requirements:
    - rule: "Active participation in a 12-Step or recovery program"
    - rule: "Attend a minimum of 3 meetings per week"
    - rule: "Maintain employment, education, or active job search"
    - rule: "Weekly house meetings and chores participation"
    - rule: "Comply with all house curfews and schedules"
    - rule: "Obtain and work with a sponsor"
    - rule: "Random drug and alcohol testing at any time"
    - rule: "Respect for all housemates and house property"
  expectations:
    - expectation: "No drugs, alcohol, or paraphernalia on property at any time"
    - expectation: "No weapons of any kind"
    - expectation: "No guests without prior house manager approval"
    - expectation: "Maintain personal space and shared common areas"
    - expectation: "Pay rent on time and fulfill financial commitments"
    - expectation: "No disruptive, threatening, or abusive behavior"
    - expectation: "Communicate openly with house managers"
    - expectation: "Support your fellow residents in their recovery"
  zero_tolerance: "River Sober Living maintains a strict zero tolerance policy for drug and alcohol use. Any resident found to be using substances will be asked to leave the house immediately. This policy exists to protect every man in our community and the integrity of the sober living environment."

