hero_headline: "Begin Your New Chapter"
hero_subheading: "A safe, structured, and supportive community for men committed to lasting recovery."
about_text: "River Sober Living is a men's sober living community in Boise, Idaho, founded in 2017 with a simple belief: lasting recovery happens in the context of genuine community, personal accountability, and intentional structure."

houses:
  - name: "Kuna House"
    location: "Kuna, Idaho"
    description: "Located in the peaceful community of Kuna, just outside Boise. A quiet, residential setting ideal for men seeking a calm environment to focus on recovery."
  - name: "Avanti House"
    location: "Boise, Idaho"
    description: "Located in Boise with easy access to meetings, employment, and support services. A strong community house built on accountability and brotherhood."
  - name: "Network House"
    location: "Boise, Idaho"
    description: "A well-established Boise home focused on building connections to recovery, community, and a new way of life."
  - name: "McMullin House"
    location: "Boise, Idaho"
    description: "One of our established Boise locations offering a stable, community-oriented environment close to the Greenbelt and outpatient resources."
  - name: "Tyson House"
    location: "Boise, Idaho"
    description: "A strong, brotherhood-focused environment where men hold each other accountable and grow together."

testimonials:
  - quote: "River gave me more than a place to sleep. It gave me brothers."
    author_name: "James T."
    author_detail: "Resident, McMullin House • 2 years sober"
  - quote: "I have a job, an apartment, and my daughter back."
    author_name: "Marcus R."
    author_detail: "Former Resident • 3 years sober"
  - quote: "The LEAP program isn't just a name. They actually walk you through it."
    author_name: "Derek W."
    author_detail: "Former Resident • 18 months sober"
